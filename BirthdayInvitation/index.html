<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="index.css">

    <title>Birthday Invitation</title>
</head>
<body>
    <div class="scene" onclick="openEnvelope()" id="scene">

        <!-- ENVELOPE -->
        <div class="envelope" id="envelope">
            <div class="envelope-back"></div>

            <div class="flap-back"></div>

            <div class="flap"></div>

            <div class="envelope-front"></div>
        </div>

        <!-- LETTER -->
        <div class="letter" id="letter">
            <div class="invitation-card">
                <h1>🎉You're Invited!🎉</h1>

                <img src="gifs/catJam.gif" class="invite-gif" id="gif">

                <h2>Milan's Pizza Party</h2>

                <p class="intro">
                    Kom naar mijn 21 diner! Pizza eten, drinken, en er is een tafeltennistafel!
                </p>

                <div class="details">
                    <p>📅 Datum: ?? Aug/Sep, 2026</p>
                    <p>🕒 Tijd: 18:00</p>
                    <p>📍 Locatie: Leest 43, Kaatsheuvel</p>
                </div>

                <div class="rsvp-section">
                    <h3>Ben je erbij?</h3>

                    <button class="yes-btn" onclick="showRSVP()">Ik zal er zijn!</button>
                    <button class="no-btn">Nuh uh</button>
                </div>
            </div>
        </div>

        <!-- RSVP -->
        <div class="rsvp-screen" id="rsvpScreen">
            <div class="rsvp-card">
                <h1>🎉 Yayyy! 🎉</h1>

                <p>Leuk dat je komt naar mijn verjaardag!</p>

                <img src="gifs/happierMilan.gif" class="invite-gif">

                <h3>Vul je naam in:</h3>

                <input
                    type="text"
                    id="nameInput"
                    placeholder="Jouw naam"
                >

                <button onclick="submitRSVP()">
                    Bevestigen
                </button>

                <p id="failMessage"></p>
                <p id="successMessage"></p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
